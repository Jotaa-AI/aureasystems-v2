name: Deploy blog al VPS

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'templates/**'
      - 'scripts/build-blog.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-blog.yml'
  workflow_dispatch:

concurrency:
  group: deploy-blog
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir blog
        run: npm run build:blog

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy del blog (rsync con --delete)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist-blog/blog/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/aureasystems.es/dist/blog/

      - name: Deploy de archivos SEO (sin --delete)
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist-blog/sitemap.xml \
            dist-blog/robots.txt \
            dist-blog/llms.txt \
            dist-blog/llms-full.txt \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/aureasystems.es/dist/

      - name: Recargar Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "sudo systemctl reload nginx"

      - name: Avisar a Google del nuevo sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://aureasystems.es/sitemap.xml" || true

      - name: Resumen
        run: |
          echo "✅ Deploy completado"
          echo "🔗 https://aureasystems.es/blog/"
